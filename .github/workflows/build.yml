name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:

  # ------------------------------------------------------------------ #
  #  Lightweight builds – tiny binaries that use system yt-dlp + ffmpeg  #
  # ------------------------------------------------------------------ #
  build-lightweight:
    name: Lightweight · ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w" \
            -trimpath \
            -o "dist/streamline-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: streamline-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  # ------------------------------------------------------------------ #
  #  Bundled / portable build – embeds yt-dlp + ffmpeg (linux-amd64)    #
  # ------------------------------------------------------------------ #
  build-bundled:
    name: Bundled (portable) · linux-amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download yt-dlp
        run: |
          curl -fsSL \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o yt-dlp
          chmod +x yt-dlp

      - name: Download ffmpeg (static amd64)
        run: |
          curl -fsSL \
            https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          # The archive unpacks to a versioned directory e.g. ffmpeg-7.x-amd64-static/
          cp ffmpeg-*-amd64-static/ffmpeg .
          chmod +x ffmpeg

      - name: Build bundled binary
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -tags bundled \
            -ldflags="-s -w" \
            -trimpath \
            -o dist/streamline-linux-amd64-bundled \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: streamline-linux-amd64-bundled
          path: dist/
          if-no-files-found: error

  # ------------------------------------------------------------------ #
  #  GitHub Release – only fires when a v*.*.* tag is pushed           #
  # ------------------------------------------------------------------ #
  release:
    name: GitHub Release
    needs: [build-lightweight, build-bundled]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
