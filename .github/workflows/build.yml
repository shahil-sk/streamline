name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:

  # ------------------------------------------------------------------ #
  #  Auto-tag – bump a patch version tag on every push to master        #
  # ------------------------------------------------------------------ #
  tag:
    name: Auto-tag
    runs-on: ubuntu-latest
    # Only tag on direct pushes (not PRs)
    if: github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          RELEASE_BRANCHES: master

  # ------------------------------------------------------------------ #
  #  Lightweight builds – tiny binaries that use system yt-dlp + ffmpeg  #
  # ------------------------------------------------------------------ #
  build-lightweight:
    name: Lightweight · ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: tag
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w" \
            -trimpath \
            -o "dist/streamline-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            .

      - uses: actions/upload-artifact@v4
        with:
          name: streamline-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  # ------------------------------------------------------------------ #
  #  Bundled / portable build – embeds yt-dlp + ffmpeg (linux-amd64)    #
  # ------------------------------------------------------------------ #
  # build-bundled:
  #   name: Bundled (portable) · linux-amd64
  #   runs-on: ubuntu-latest
  #   needs: tag
  #   if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')

  #   steps:
  #     - uses: actions/checkout@v4

  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version-file: go.mod
  #         cache: true

  #     - name: Download yt-dlp
  #       run: |
  #         curl -fsSL \
  #           https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
  #           -o yt-dlp
  #         chmod +x yt-dlp

  #     - name: Download ffmpeg (static amd64)
  #       run: |
  #         curl -fsSL \
  #           https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
  #           -o ffmpeg.tar.xz
  #         tar -xf ffmpeg.tar.xz
  #         cp ffmpeg-*-amd64-static/ffmpeg .
  #         chmod +x ffmpeg

  #     - name: Build bundled binary
  #       env:
  #         CGO_ENABLED: "0"
  #       run: |
  #         mkdir -p dist
  #         go build \
  #           -tags bundled \
  #           -ldflags="-s -w" \
  #           -trimpath \
  #           -o dist/streamline-linux-amd64-bundled \
  #           .

  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: streamline-linux-amd64-bundled
  #         path: dist/
  #         if-no-files-found: error

  # ------------------------------------------------------------------ #
  #  GitHub Release – fires on every push to master (not PRs)          #
  # ------------------------------------------------------------------ #
  release:
    name: GitHub Release
    needs: [tag, build-lightweight, build-bundled]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
