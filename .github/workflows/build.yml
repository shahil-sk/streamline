name: Build & Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:

  # ------------------------------------------------------------------ #
  #  Lightweight builds                                                #
  # ------------------------------------------------------------------ #
  build-lightweight:
    name: Lightweight · ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64

          - goos: linux
            goarch: arm64

          - goos: darwin
            goarch: amd64

          - goos: darwin
            goarch: arm64

          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/streamline-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamline-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  # ------------------------------------------------------------------ #
  #  Portable bundled build                                            #
  # ------------------------------------------------------------------ #
  build-bundled:
    name: Bundled · linux-amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download yt-dlp
        run: |
          curl -fsSL \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o yt-dlp

          chmod +x yt-dlp

      - name: Download ffmpeg
        run: |
          wget -q \
            https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            -O ffmpeg.tar.xz

          tar -xf ffmpeg.tar.xz

          cp ffmpeg-*-amd64-static/ffmpeg .
          chmod +x ffmpeg

      - name: Build bundled binary
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist

          go build \
            -tags bundled \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/streamline-linux-amd64-bundled \
            .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamline-linux-amd64-bundled
          path: dist/*
          if-no-files-found: error

  # ------------------------------------------------------------------ #
  #  GitHub Release                                                    #
  # ------------------------------------------------------------------ #
  release:
    name: GitHub Release
    runs-on: ubuntu-latest

    needs:
      - build-lightweight
      - build-bundled

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
